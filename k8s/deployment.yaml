apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsaf-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dsaf-app
  template:
    metadata:
      labels:
        app: dsaf-app
    spec:
      serviceAccountName: dsaf-app-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: dsaf-app
          image: dsaf-vulnerable-app:remediated
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"